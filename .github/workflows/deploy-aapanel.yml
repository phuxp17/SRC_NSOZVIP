name: CI + Deploy (VPS)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: add unit tests here if you have them.
      - name: Build Docker image (sanity)
        run: docker build -t nso-app:ci .

  deploy:
    needs: ci
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    steps:
      - name: Pull latest code on VPS
        run: |
          set -eu
          cd /opt/nso
          git checkout master
          git pull --ff-only origin master

      - name: Deploy with Docker Compose (VPS)
        run: |
          set -eu
          cd /opt/nso
          chmod +x scripts/deploy-vps.sh
          DEPLOY_PATH="/opt/nso" COMPOSE_FILE="docker-compose.vps.yml" ENV_FILE=".env.vps" ./scripts/deploy-vps.sh
